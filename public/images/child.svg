<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- 아이 (child) -->
  <!-- body -->
  <rect x="38" y="62" width="44" height="34" rx="8" fill="#FFD54F"/>
  <!-- arms -->
  <rect x="22" y="66" width="18" height="10" rx="5" fill="#FFD54F"/>
  <rect x="80" y="66" width="18" height="10" rx="5" fill="#FFD54F"/>
  <!-- legs -->
  <rect x="44" y="92" width="12" height="18" rx="5" fill="#90CAF9"/>
  <rect x="64" y="92" width="12" height="18" rx="5" fill="#90CAF9"/>
  <!-- shoes -->
  <ellipse cx="50" cy="112" rx="8" ry="5" fill="#E57373"/>
  <ellipse cx="70" cy="112" rx="8" ry="5" fill="#E57373"/>
  <!-- head -->
  <circle cx="60" cy="38" r="24" fill="#FFCC80"/>
  <!-- hair -->
  <path d="M36 34 Q40 12 60 14 Q80 12 84 34" fill="#5D4037" stroke="none"/>
  <circle cx="42" cy="24" r="6" fill="#5D4037"/>
  <circle cx="78" cy="24" r="6" fill="#5D4037"/>
  <!-- eyes -->
  <circle cx="50" cy="40" r="3.5" fill="#3E2723"/>
  <circle cx="70" cy="40" r="3.5" fill="#3E2723"/>
  <!-- eye highlights -->
  <circle cx="51.5" cy="38.5" r="1.2" fill="#fff"/>
  <circle cx="71.5" cy="38.5" r="1.2" fill="#fff"/>
  <!-- cheeks -->
  <ellipse cx="43" cy="48" rx="5" ry="3" fill="#FFAB91" opacity="0.5"/>
  <ellipse cx="77" cy="48" rx="5" ry="3" fill="#FFAB91" opacity="0.5"/>
  <!-- smile -->
  <path d="M53 50 Q60 56 67 50" stroke="#3E2723" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
