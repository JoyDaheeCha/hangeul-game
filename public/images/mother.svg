<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140">
  <!-- 어머니 (mother) -->
  <!-- dress -->
  <path d="M38 72 L30 130 Q60 136 90 130 L82 72 Z" fill="#CE93D8" rx="4"/>
  <!-- apron -->
  <path d="M46 78 L42 120 Q60 124 78 120 L74 78 Z" fill="#F3E5F5" opacity="0.7"/>
  <!-- arms -->
  <rect x="18" y="74" width="20" height="10" rx="5" fill="#FFCC80"/>
  <rect x="82" y="74" width="20" height="10" rx="5" fill="#FFCC80"/>
  <!-- hands - heart gesture -->
  <circle cx="16" cy="86" r="6" fill="#FFCC80"/>
  <circle cx="104" cy="86" r="6" fill="#FFCC80"/>
  <path d="M12 86 Q10 76 16 74" stroke="#E91E63" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M108 86 Q110 76 104 74" stroke="#E91E63" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- shoes -->
  <ellipse cx="48" cy="133" rx="9" ry="5" fill="#8D6E63"/>
  <ellipse cx="72" cy="133" rx="9" ry="5" fill="#8D6E63"/>
  <!-- head -->
  <circle cx="60" cy="40" r="26" fill="#FFCC80"/>
  <!-- hair -->
  <path d="M34 36 Q36 8 60 10 Q84 8 86 36" fill="#3E2723"/>
  <path d="M34 36 Q32 50 36 56" fill="#3E2723"/>
  <path d="M86 36 Q88 50 84 56" fill="#3E2723"/>
  <!-- eyes -->
  <path d="M48 42 Q50 38 54 42" stroke="#3E2723" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M66 42 Q68 38 72 42" stroke="#3E2723" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- warm smile -->
  <path d="M50 52 Q60 60 70 52" stroke="#3E2723" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- cheeks -->
  <ellipse cx="42" cy="50" rx="5.5" ry="3.5" fill="#FFAB91" opacity="0.5"/>
  <ellipse cx="78" cy="50" rx="5.5" ry="3.5" fill="#FFAB91" opacity="0.5"/>
  <!-- heart -->
  <path d="M56 90 Q56 84 60 84 Q64 84 64 90 Q64 96 60 100 Q56 96 56 90Z" fill="#E91E63"/>
</svg>
